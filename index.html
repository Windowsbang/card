    <div id="dialog">

            <div id="message">敬爱的老师：<br>                今天是您的节日——教师节。在这个特别的日子里，我向您表达我最诚挚的祝福。
                老师，您不仅教给我们知识，还教给我们做人的道理，让我们懂得如何成为一个有道德、有责任感、有担当的人。
                您用最真挚的关怀和最用心的教学陪伴我们度过每一个难关，为我们的成长和发展奠定了坚实的基础。
                亲爱的老师，祝您教师节快乐！感谢您为我们所做的一切，我们将永远怀念您的恩情和付出。愿您身体健康，心情愉快，继续在教育事业上发挥您的优势，为更多的学生带来光明和希望。
                <p align="right">您的学生：闫艺涵</p>
